# Render Blueprint — 백엔드(FastAPI) 배포용.
# Render 대시보드에서 "New +" → "Blueprint" → 이 레포(gg_parrot) 선택 시 자동 인식됩니다.
# (수동 생성해도 됨: New Web Service → 아래 rootDir/build/start 값 그대로 입력)
services:
  - type: web
    name: gg-parrot            # 배포 URL이 https://gg-parrot.onrender.com 이 됩니다.
    runtime: python            # 이름이 이미 쓰였다면 접미사가 붙을 수 있으니, 실제 URL을 확인 후
    rootDir: backend           # frontend/vercel.json 의 destination 도 그 URL로 맞추세요.
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      # api.binance.com 은 미국 IP를 차단 → Render(미국 리전)에선 공개 데이터
      # 미러 호스트를 사용(동일한 공개 시세). 로컬은 이 변수 없이 기본 호스트 사용.
      - key: BINANCE_API_BASE
        value: "https://data-api.binance.vision"
